---
# Windows Patch and Reboot - Native win_updates
# Uses ansible.windows.win_updates (WUA) instead of microsoft.mecm
# Works with WSUS, Windows Update, or Microsoft Update - whatever the host is configured for
#
# AAP Survey Variables:
#   win_patch_categories      - Update categories (comma-separated), default: SecurityUpdates,CriticalUpdates,DefinitionUpdates
#   win_patch_accept_list     - KB list to include (comma-separated)
#   win_patch_reject_list     - KB list to exclude (comma-separated)
#   win_patch_reboot          - Allow reboots, default: true
#   win_patch_reboot_timeout  - Reboot timeout in seconds, default: 900
#   win_patch_serial          - Batch size for rolling updates, default: 0

- name: Windows Patch and Reboot
  hosts: all
  gather_facts: true
  serial: "{{ win_patch_serial | default(0) }}"
  roles:
    - role: win_patch_and_reboot
