---
- name: Check for available updates
  ansible.windows.win_updates:
    category_names: "{{ _categories }}"
    accept_list: "{{ _accept_list if _accept_list | length > 0 else omit }}"
    reject_list: "{{ _reject_list if _reject_list | length > 0 else omit }}"
    state: searched
    log_path: "{{ win_patch_log_path }}"
  register: update_search

- name: Report available updates
  ansible.builtin.debug:
    msg: "Found {{ update_search.found_update_count }} updates available for installation"
